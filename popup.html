<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <title>LLM Readiness</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>

<div class="app">

  <div class="header">
    <h1>LLM Readiness</h1>
    <p class="subtitle">AI Extractability Audit</p>
  </div>

  <div class="score-card">
    <div class="score-circle" id="scoreCircle">
      <span id="score">0</span>
    </div>
    <p class="score-label">Overall Score</p>
  </div>

  <div class="grid">

    <div class="card">
      <h3>Markdown</h3>
      <p id="markdown">-</p>
    </div>

    <div class="card">
      <h3>Extractability</h3>
      <p id="extract">-</p>
    </div>

    <div class="card">
      <h3>Token Efficiency</h3>
      <p id="token">-</p>
    </div>

    <div class="card">
      <h3>Conversion</h3>
      <p id="conversion">-</p>
    </div>

  </div>

  <div class="card full">
    <h3>Top Issues</h3>
    <ul id="issues"></ul>
  </div>

  <div class="card full">
    <h3>Quick Fixes</h3>
    <ul id="fixes"></ul>
  </div>

</div>

<script src="popup.js"></script>
</body>
</html>
